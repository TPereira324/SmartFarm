<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - CocoRoot</title>
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="app" class="welcome-page">
        <div class="welcome-container">
            <div class="welcome-image">
                <img src="https://images.unsplash.com/photo-1596701062351-df5f8a42f3c7?q=80&w=1000&auto=format&fit=crop" alt="Coconuts">
            </div>
            <div class="welcome-content">
                <div class="logo-section">
                    <div class="logo-icon">
                        <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M50 85C69.33 85 85 69.33 85 50C85 30.67 69.33 15 50 15C30.67 15 15 30.67 15 50C15 69.33 30.67 85 50 85Z" fill="#7D5A2E"/>
                            <path d="M50 75C63.8071 75 75 63.8071 75 50C75 36.1929 63.8071 25 50 25C36.1929 25 25 36.1929 25 50C25 63.8071 36.1929 75 50 75Z" fill="white"/>
                            <path d="M50 65C58.2843 65 65 58.2843 65 50C65 41.7157 58.2843 35 50 35C41.7157 35 35 41.7157 35 50C35 58.2843 41.7157 65 50 65Z" fill="#F4F7F6"/>
                            <path d="M50 15C50 15 55 5 65 5" stroke="#2D5A27" stroke-width="4" stroke-linecap="round"/>
                            <path d="M50 15C50 15 45 5 35 5" stroke="#2D5A27" stroke-width="4" stroke-linecap="round"/>
                            <path d="M50 5V15" stroke="#2D5A27" stroke-width="4" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h1 class="brand-name">CocoRoot</h1>
                    <p class="slogan">Gestão inteligente para os seus cultivos</p>
                </div>
                
                <ul class="features-list">
                    <li>Monitorize as suas culturas em tempo real</li>
                    <li>Receba alertas e dicas personalizadas</li>
                    <li>Aprenda com outros agricultores</li>
                </ul>

                <div class="button-group">
                    <button class="btn-primary" onclick="location.href='login.html'">Entrar</button>
                    <button class="btn-secondary">Registar-me</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

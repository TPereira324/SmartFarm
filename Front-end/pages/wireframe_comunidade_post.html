<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Comunidade — Post — CocoRoot</title>
    <link rel="stylesheet" href="../css/wireframe.css">
    <style>
        .post-wrapper {
            max-width: 720px;
            margin: 0 auto;
            padding: 48px 40px;
        }

        /* ---- Topo: voltar + meta ---- */
        .post-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 3px solid #222;
        }
        .post-meta-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .post-author {
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .post-cat {
            border: 2px solid #222;
            padding: 3px 12px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ---- Título do post ---- */
        .post-heading {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        /* ---- Corpo ---- */
        .post-body-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 28px 0;
            border-top: 2px solid #e0e0e0;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 36px;
        }

        /* ---- Respostas ---- */
        .respostas-header {
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .respostas-count {
            border: 2px solid #222;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 900;
        }

        .resposta-card {
            display: flex;
            gap: 16px;
            padding: 20px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border: 2px solid #222;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 13px;
        }
        .resposta-body {
            flex: 1;
        }
        .resposta-meta {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #555;
            margin-bottom: 10px;
        }
        .resposta-lines {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* ---- Formulário ---- */
        .reply-section {
            margin-top: 36px;
            border: 3px solid #222;
            padding: 24px;
        }
        .reply-section-title {
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 14px;
            color: #555;
        }
        .reply-textarea {
            width: 100%;
            border: 2px solid #ccc;
            padding: 14px;
            font-size: 14px;
            background: none;
            height: 110px;
            resize: none;
            outline: none;
            font-family: inherit;
            display: block;
            margin-bottom: 14px;
        }
        .reply-textarea:focus {
            border-color: #222;
            background: #fafafa;
        }
        .reply-actions {
            display: flex;
            justify-content: flex-end;
        }
    </style>
</head>
<body class="app-page">

    <!-- NAV -->
    <nav class="nav">
        <a href="wireframe_home.html" class="nav-logo">LOGO</a>
        <div class="nav-links">
            <a href="wireframe_noticias.html" class="nav-link">Notícias</a>
            <a href="wireframe_dashboard.html" class="nav-link">Parcelas</a>
            <a href="wireframe_comunidade.html" class="nav-link active">Comunidade</a>
            <a href="wireframe_comecar_zero.html" class="nav-link">Guia</a>
        </div>
        <div class="nav-right">
            <div class="nav-user">U</div>
        </div>
    </nav>

    <div class="post-wrapper">

        <!-- Topo: voltar + autor + categoria -->
        <div class="post-topbar">
            <a href="wireframe_comunidade.html" class="back-link">← Voltar</a>
            <div class="post-meta-right">
                <span class="post-author">Anno · 14:45</span>
                <span class="post-cat">Dica</span>
            </div>
        </div>

        <!-- Título do post -->
        <div class="post-heading">
            <div class="txt-line" style="height:9px;background:#222;width:85%;"></div>
            <div class="txt-line" style="height:9px;background:#222;width:65%;"></div>
        </div>

        <!-- Corpo do post -->
        <div class="post-body-block">
            <div class="txt-line w100"></div>
            <div class="txt-line w100"></div>
            <div class="txt-line w80"></div>
            <div class="txt-line w100"></div>
            <div class="txt-line w65"></div>
            <div style="height:4px;"></div>
            <div class="txt-line w100"></div>
            <div class="txt-line w80"></div>
            <div class="txt-line w100"></div>
            <div class="txt-line w50"></div>
        </div>

        <!-- Respostas -->
        <div class="respostas-header">
            <div class="respostas-count">2</div>
            Respostas
        </div>

        <div class="resposta-card">
            <div class="avatar">U</div>
            <div class="resposta-body">
                <div class="resposta-meta">Utilizador · 14:52</div>
                <div class="resposta-lines">
                    <div class="txt-line w100"></div>
                    <div class="txt-line w80"></div>
                    <div class="txt-line w65"></div>
                </div>
            </div>
        </div>

        <div class="resposta-card">
            <div class="avatar">U</div>
            <div class="resposta-body">
                <div class="resposta-meta">Utilizador · 15:10</div>
                <div class="resposta-lines">
                    <div class="txt-line w100"></div>
                    <div class="txt-line w80"></div>
                    <div class="txt-line w50"></div>
                </div>
            </div>
        </div>

        <!-- Formulário de resposta -->
        <div class="reply-section">
            <div class="reply-section-title">Escreve Resposta</div>
            <textarea class="reply-textarea"></textarea>
            <div class="reply-actions">
                <button class="btn">Enviar</button>
            </div>
        </div>

    </div>

</body>
</html>

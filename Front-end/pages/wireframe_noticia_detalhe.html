<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Notícia Detalhe — CocoRoot</title>
    <link rel="stylesheet" href="../css/wireframe.css">
</head>
<body class="app-page">

    <!-- NAV -->
    <nav class="nav">
        <a href="wireframe_home.html" class="nav-logo">LOGO</a>
        <div class="nav-links">
            <a href="wireframe_noticias.html" class="nav-link active">Notícias</a>
            <a href="wireframe_dashboard.html" class="nav-link">Parcelas</a>

    <div class="page-content" style="max-width:780px;">

        <!-- Ações: gosto + partilha -->
        <div class="detalhe-actions">
            <span style="cursor:pointer;">♡</span>
            <span style="cursor:pointer;">⤴</span>
        </div>

        <!-- Título placeholder -->
        <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:28px;">
            <div class="txt-line title w100"></div>
            <div class="txt-line title w80"></div>
            <div class="txt-line w50" style="margin-top:4px;"></div>
        </div>

        <!-- Imagem principal -->
        <div class="detalhe-img img-ph"></div>

        <!-- Corpo do artigo -->
        <div class="detalhe-body">
            <div class="txt-line w100"></div>
            <div class="txt-line w100"></div>
            <div class="txt-line w80"></div>
            <div class="txt-line w100"></div>
            <div class="txt-line w100"></div>
            <div class="txt-line w65"></div>
            <div style="height:8px;"></div>
            <div class="txt-line w100"></div>
            <div class="txt-line w100"></div>
            <div class="txt-line w80"></div>
            <div class="txt-line w100"></div>
            <div class="txt-line w50"></div>
        </div>

        <!-- Comentários -->
        <div class="comments-section">
            <div class="comment-title">Comentários</div>

            <div class="comment-item">
                <div class="comment-avatar"></div>
                <div class="comment-lines">
                    <div class="txt-line w80"></div>
                    <div class="txt-line w100"></div>
                    <div class="txt-line w65"></div>
                </div>
            </div>

            <div class="comment-item">
                <div class="comment-avatar"></div>
                <div class="comment-lines">
                    <div class="txt-line w80"></div>
                    <div class="txt-line w100"></div>
                    <div class="txt-line w50"></div>
                </div>
            </div>

            <div class="comment-item">
                <div class="comment-avatar"></div>
                <div class="comment-lines">
                    <div class="txt-line w80"></div>
                    <div class="txt-line w100"></div>
                    <div class="txt-line w65"></div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>

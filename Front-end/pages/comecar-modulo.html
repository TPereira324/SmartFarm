<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo - CocoRoot</title>
    <link rel="stylesheet" href="../css/cocoroot.css">
</head>

<body class="app-page">
    <div class="page-content module-page">
        <section class="guide-shell">
            <div class="module-header">
                <div>
                    <div class="module-heading" id="modulo-title">Introdução</div>
                    <div class="module-subheading" id="modulo-kicker">Módulo 1</div>
                </div>
                <div id="modulo-status" class="guide-status">Em curso</div>
            </div>

            <div class="module-divider"></div>

            <div class="module-img img-ph"></div>

            <div class="module-divider"></div>

            <div class="module-body">
                <div>
                    <div class="module-section-title">Passo a Passo</div>
                    <ul class="step-checklist" id="module-steps"></ul>
                </div>

                <div class="module-side">
                    <div class="materials-title">Materiais necessários</div>
                    <ul class="materials-list" id="module-materials"></ul>
                    <div class="module-actions">
                        <button id="finish-module" class="btn">Concluir módulo</button>
                        <a id="next-module" href="comecar-modulo.html?mod=2" class="btn" hidden>Módulo 2 -></a>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="../js/models/modulesData.js"></script>
    <script>
        (function () {
            const user = JSON.parse(localStorage.getItem('user'));
            const params = new URLSearchParams(window.location.search);
            const mod = parseInt(params.get('mod') || '1', 10);
            const completedKey = 'cocoRootCompletedModules';
            const progressKey = 'cocoRootModuleProgress';

            if (!user) {
                const pageContent = document.querySelector('.page-content');
                pageContent.innerHTML = `
                    <div class="guide-shell module-empty-state">
                        <div class="module-empty-icon">🔒</div>
                        <div class="module-empty-title">Inicie sessão para continuar</div>
                        <div class="module-empty-text">Precisa de ter sessão iniciada para visualizar e realizar os módulos.</div>
                        <a href="login.html" class="btn">Iniciar sessão</a>
                    </div>
                `;
                return;
            }

            const userId = String(user.id ?? 'anon');
            const readCompletedStore = () => {
                try {
                    const raw = localStorage.getItem(completedKey);
                    return raw ? JSON.parse(raw) : {};
                } catch {
                    return {};
                }
            };
            const writeCompletedStore = (store) => {
                localStorage.setItem(completedKey, JSON.stringify(store || {}));
            };
            const completedStore = readCompletedStore();
            let completedModules = Array.isArray(completedStore[userId]) ? completedStore[userId] : [];

            if (mod > 1 && !completedModules.includes(mod - 1)) {
                alert('Precisa de concluir o módulo anterior primeiro.');
                window.location.href = 'comecar.html';
                return;
            }

            const modules = window.CocoRootModulesData;
            const current = modules[mod] || modules[1];
            document.getElementById('modulo-kicker').textContent = 'Módulo ' + (modules[mod] ? mod : 1);
            document.getElementById('modulo-title').textContent = current.title;

            const imgPlaceholder = document.querySelector('.modulo-img');
            if (imgPlaceholder) {
                imgPlaceholder.innerHTML = `<img src="${current.img}" style="width:100%;height:100%;object-fit:cover;" alt="${current.title}">`;
            }

            const next = mod + 1;
            const nextBtn = document.getElementById('next-module');
            const finishBtn = document.getElementById('finish-module');
            const statusEl = document.getElementById('modulo-status');
            const stepsRoot = document.getElementById('module-steps');
            const materialsRoot = document.getElementById('module-materials');

            const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

            const readProgressStore = () => {
                try {
                    const raw = localStorage.getItem(progressKey);
                    return raw ? JSON.parse(raw) : {};
                } catch {
                    return {};
                }
            };

            const writeProgressStore = (store) => {
                localStorage.setItem(progressKey, JSON.stringify(store || {}));
            };

            const store = readProgressStore();
            const userProgress = (store[userId] && typeof store[userId] === 'object') ? store[userId] : {};
            const totalSteps = Array.isArray(current.steps) ? current.steps.length : 0;
            let progress = clamp(Number(userProgress[String(mod)] || 0), 0, totalSteps);
            if (completedModules.includes(mod)) {
                progress = totalSteps;
                userProgress[String(mod)] = progress;
                store[userId] = userProgress;
                writeProgressStore(store);
            }

            const renderStatus = () => {
                const isCompleted = completedModules.includes(mod);
                if (!statusEl) return;
                if (isCompleted) {
                    statusEl.textContent = 'Concluído';
                    return;
                }
                statusEl.textContent = 'Em curso';
            };

            const renderSteps = () => {
                if (!stepsRoot) return;
                stepsRoot.innerHTML = '';
                const steps = Array.isArray(current.steps) ? current.steps : [];
                steps.forEach((step, idx) => {
                    const stepNumber = idx + 1;
                    const isDone = stepNumber <= progress;
                    const isActive = stepNumber === progress + 1 && progress < totalSteps;

                    const li = document.createElement('li');
                    li.dataset.step = String(stepNumber);
                    li.tabIndex = 0;
                    li.classList.toggle('active-step', isActive);

                    const check = document.createElement('div');
                    check.className = 'step-check' + (isDone ? ' done' : '');
                    check.textContent = isDone ? '✓' : '';

                    const body = document.createElement('div');
                    body.style.flex = '1';

                    const title = document.createElement('div');
                    title.className = 'step-title-row';
                    title.textContent = step?.title || `Passo ${stepNumber}`;

                    const desc = document.createElement('div');
                    desc.className = 'step-desc-row';
                    desc.textContent = step?.description || '';

                    body.appendChild(title);
                    body.appendChild(desc);

                    li.appendChild(check);
                    li.appendChild(body);

                    const selectStep = () => {
                        if (completedModules.includes(mod)) {
                            progress = totalSteps;
                            renderSteps();
                            renderStatus();
                            return;
                        }
                        progress = clamp(stepNumber, 0, totalSteps);
                        userProgress[String(mod)] = progress;
                        store[userId] = userProgress;
                        writeProgressStore(store);
                        renderSteps();
                        renderStatus();
                        if (finishBtn) finishBtn.disabled = progress < totalSteps;
                    };

                    li.addEventListener('click', selectStep);
                    li.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            selectStep();
                        }
                    });

                    stepsRoot.appendChild(li);
                });
            };

            const renderMaterials = () => {
                const items = Array.isArray(current.materials) ? current.materials : [];
                if (materialsRoot) {
                    materialsRoot.innerHTML = '';
                    items.forEach((text) => {
                        const li = document.createElement('li');
                        li.innerHTML = `<div class="bullet"></div><div style="flex:1;">${text}</div>`;
                        materialsRoot.appendChild(li);
                    });
                }
            };

            const syncButtons = () => {
                const isCompleted = completedModules.includes(mod);
                if (finishBtn) {
                    finishBtn.disabled = !isCompleted && progress < totalSteps;
                    finishBtn.textContent = isCompleted ? 'Voltar ao Guia' : 'Concluir Módulo';
                }
                if (nextBtn) {
                    if (modules[next]) {
                        nextBtn.hidden = false;
                        nextBtn.setAttribute('href', 'comecar-modulo.html?mod=' + next);
                        nextBtn.textContent = 'Módulo ' + next + ' ->';
                        nextBtn.classList.toggle('is-disabled', !isCompleted);
                    } else {
                        nextBtn.hidden = true;
                    }
                }
            };

            renderSteps();
            renderMaterials();
            renderStatus();
            syncButtons();

            finishBtn.addEventListener('click', () => {
                if (completedModules.includes(mod)) {
                    window.location.href = 'comecar.html';
                    return;
                }
                if (progress < totalSteps) {
                    alert('Conclua todos os passos antes de finalizar o módulo.');
                    return;
                }
                const completed = Array.isArray(completedStore[userId]) ? [...completedStore[userId]] : [];
                if (!completed.includes(mod)) {
                    completed.push(mod);
                    completedStore[userId] = completed;
                    writeCompletedStore(completedStore);
                }
                completedModules = completed;

                progress = totalSteps;
                userProgress[String(mod)] = progress;
                store[userId] = userProgress;
                writeProgressStore(store);

                renderStatus();
                syncButtons();

                window.location.href = 'comecar.html';
            });

            document.title = 'Módulo ' + (modules[mod] ? mod : 1) + ' - CocoRoot';
        })();
    </script>
    <script src="../js/layout.js"></script>
</body>

</html>

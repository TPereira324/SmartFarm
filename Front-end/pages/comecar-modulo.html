<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo - CocoRoot</title>
    <link rel="stylesheet" href="../css/wireframe.css">
</head>

<body class="app-page">


    <div class="page-content" style="max-width:900px;">
        <div style="margin-bottom:18px;">
            <a href="comecar.html" class="back-link">← Voltar ao Guia</a>
        </div>

        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;">
            <div>
                <div id="modulo-kicker"
                    style="font-size:12px;font-weight:900;letter-spacing:0.2px;color:var(--muted);margin-bottom:6px;">
                    MÓDULO 1</div>
                <div id="modulo-title" style="font-size:30px;font-weight:900;letter-spacing:-0.6px;line-height:1.15;">
                    Introdução</div>
            </div>
            <div id="modulo-status"
                style="border:1px solid rgba(27,27,27,0.14);border-radius:999px;padding:10px 14px;font-size:12px;font-weight:900;color:rgba(27,27,27,0.74);background:rgba(255,255,255,0.92);box-shadow:0 14px 26px rgba(0,0,0,0.06);">
                ● Em curso</div>
        </div>

        <div class="modulo-img img-ph" style="overflow:hidden;padding:0;">

        </div>

        <div
            style="font-size:12px;font-weight:900;letter-spacing:0.2px;text-transform:uppercase;margin-bottom:12px;color:rgba(27,27,27,0.78);">
            Passo a Passo</div>
        <ul class="step-checklist" id="module-steps"></ul>

        <div style="margin-top:26px;">
            <div
                style="font-size:12px;font-weight:900;letter-spacing:0.2px;text-transform:uppercase;margin-bottom:12px;color:rgba(27,27,27,0.78);">
                Materiais Necessários</div>
            <div class="materiais-grid">
                <ul class="materiais-list" id="module-materials"></ul>
                <div class="img-ph" id="module-materials-img" style="height:160px;overflow:hidden;padding:0;">

                </div>
            </div>
        </div>

        <div style="margin-top:22px;display:flex;justify-content:flex-end;gap:12px;">
            <button id="finish-module" class="btn" style="background:var(--primary);color:white;">Concluir
                Módulo</button>
            <a id="next-module" href="comecar-modulo.html?mod=2" class="btn" style="display:none;">Próximo Módulo →</a>
        </div>
    </div>

    <script>
        (function () {
            const user = JSON.parse(localStorage.getItem('user'));
            const params = new URLSearchParams(window.location.search);
            const mod = parseInt(params.get('mod') || '1', 10);
            let completedModules = JSON.parse(localStorage.getItem('completedModules') || '[]');
            const progressKey = 'cocoRootModuleProgress';

            if (!user) {
                const pageContent = document.querySelector('.page-content');
                pageContent.innerHTML = `
                    <div style="text-align:center;padding:60px 20px;">
                        <div style="font-size:64px;margin-bottom:20px;">🔒</div>
                        <div style="font-size:24px;font-weight:900;margin-bottom:12px;">Inicie sessão para continuar</div>
                        <div style="color:var(--muted);margin-bottom:24px;">Precisa de ter sessão iniciada para visualizar e realizar os módulos.</div>
                        <a href="login.html" class="btn" style="background:var(--primary);color:white;padding:14px 28px;font-size:16px;">Iniciar Sessão</a>
                    </div>
                `;
                return;
            }

            if (mod > 1 && !completedModules.includes(mod - 1)) {
                alert('Precisa de concluir o módulo anterior primeiro.');
                window.location.href = 'comecar.html';
                return;
            }

            const modules = {
                1: {
                    title: 'Introdução',
                    img: '../image/planta.jpeg',
                    steps: [
                        { title: 'Preparar o espaço de trabalho', description: 'Organize materiais e assegure ventilação e limpeza.' },
                        { title: 'Verificar drenagem', description: 'Garanta escoamento e retenção equilibrados.' },
                        { title: 'Medir humidade', description: 'Comece com valores base para ajustar a rega.' },
                        { title: 'Registar no painel', description: 'Salve medições e notas para acompanhamento.' },
                    ],
                    materials: [
                        'Balde / recipiente',
                        'Medidor de pH/EC (opcional)',
                        'Regador / sistema de rega',
                        'Luvas e tesoura',
                    ],
                },
                2: {
                    title: 'Preparação do substrato',
                    img: '../image/Coco.jpeg',
                    steps: [
                        { title: 'Hidratar a fibra de coco', description: 'Deixe a fibra expandir com água limpa antes de usar.' },
                        { title: 'Lavar e drenar', description: 'Reduza excesso de sais e garanta boa drenagem.' },
                        { title: 'Ajustar pH/EC (opcional)', description: 'Meça e ajuste conforme o tipo de cultivo.' },
                        { title: 'Preparar mistura final', description: 'Combine componentes e deixe pronto para o plantio.' },
                    ],
                    materials: [
                        'Fibra de coco (bloco ou solta)',
                        'Água limpa',
                        'Peneira ou saco de drenagem',
                        'Medidor de pH/EC (opcional)',
                    ],
                },
                3: {
                    title: 'Plantio e rega',
                    img: '../image/planta.jpeg',
                    steps: [
                        { title: 'Escolher recipiente/área', description: 'Defina o local e o tipo de vaso/parcela.' },
                        { title: 'Plantar corretamente', description: 'Respeite profundidade e espaçamento recomendados.' },
                        { title: 'Regar no arranque', description: 'Faça uma primeira rega controlada para assentar o substrato.' },
                        { title: 'Definir rotina de rega', description: 'Ajuste a frequência com base na humidade e clima.' },
                    ],
                    materials: [
                        'Mudas ou sementes',
                        'Substrato preparado',
                        'Regador / sistema de rega',
                        'Marcadores (opcional)',
                    ],
                },
                4: {
                    title: 'Manutenção',
                    img: '../image/Coco.jpeg',
                    steps: [
                        { title: 'Monitorizar humidade', description: 'Verifique regularmente para evitar excesso ou falta de água.' },
                        { title: 'Acompanhar nutrientes', description: 'Observe sinais e ajuste a adubação quando necessário.' },
                        { title: 'Controlar pragas/doenças', description: 'Inspecione folhas e aplique medidas preventivas.' },
                        { title: 'Registar evolução', description: 'Guarde notas e fotos para comparar resultados.' },
                    ],
                    materials: [
                        'Caderno/telemóvel para registos',
                        'Tesoura de poda',
                        'Pulverizador (opcional)',
                        'Adubo conforme a cultura (opcional)',
                    ],
                },
            };
            const current = modules[mod] || modules[1];
            document.getElementById('modulo-kicker').textContent = 'MÓDULO ' + (modules[mod] ? mod : 1);
            document.getElementById('modulo-title').textContent = current.title;

            // Fix: set image if element exists or just update the placeholder
            const imgPlaceholder = document.querySelector('.modulo-img');
            if (imgPlaceholder) {
                imgPlaceholder.innerHTML = `<img src="${current.img}" style="width:100%;height:100%;object-fit:cover;" alt="${current.title}">`;
            }

            const next = mod + 1;
            const nextBtn = document.getElementById('next-module');
            const finishBtn = document.getElementById('finish-module');
            const statusEl = document.getElementById('modulo-status');
            const stepsRoot = document.getElementById('module-steps');
            const materialsRoot = document.getElementById('module-materials');
            const materialsImg = document.getElementById('module-materials-img');

            const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

            const readProgressStore = () => {
                try {
                    const raw = localStorage.getItem(progressKey);
                    return raw ? JSON.parse(raw) : {};
                } catch {
                    return {};
                }
            };

            const writeProgressStore = (store) => {
                localStorage.setItem(progressKey, JSON.stringify(store || {}));
            };

            const userId = String(user.id ?? 'anon');
            const store = readProgressStore();
            const userProgress = (store[userId] && typeof store[userId] === 'object') ? store[userId] : {};
            const totalSteps = Array.isArray(current.steps) ? current.steps.length : 0;
            let progress = clamp(Number(userProgress[String(mod)] || 0), 0, totalSteps);
            if (completedModules.includes(mod)) {
                progress = totalSteps;
                userProgress[String(mod)] = progress;
                store[userId] = userProgress;
                writeProgressStore(store);
            }

            const renderStatus = () => {
                const isCompleted = completedModules.includes(mod);
                if (!statusEl) return;
                if (isCompleted) {
                    statusEl.textContent = '● Concluído';
                    statusEl.style.color = 'var(--primary)';
                    return;
                }
                statusEl.textContent = `● Em curso (${progress}/${totalSteps})`;
                statusEl.style.color = 'rgba(27,27,27,0.74)';
            };

            const renderSteps = () => {
                if (!stepsRoot) return;
                stepsRoot.innerHTML = '';
                const steps = Array.isArray(current.steps) ? current.steps : [];
                steps.forEach((step, idx) => {
                    const stepNumber = idx + 1;
                    const isDone = stepNumber <= progress;
                    const isActive = stepNumber === progress + 1 && progress < totalSteps;

                    const li = document.createElement('li');
                    li.dataset.step = String(stepNumber);
                    li.tabIndex = 0;
                    li.classList.toggle('active-step', isActive);

                    const check = document.createElement('div');
                    check.className = 'step-check' + (isDone ? ' done' : '');
                    check.textContent = isDone ? '✓' : '';

                    const body = document.createElement('div');
                    body.style.flex = '1';

                    const title = document.createElement('div');
                    title.style.fontWeight = '900';
                    title.style.marginBottom = '4px';
                    title.textContent = step?.title || `Passo ${stepNumber}`;

                    const desc = document.createElement('div');
                    desc.style.color = 'var(--muted)';
                    desc.style.lineHeight = '1.6';
                    desc.textContent = step?.description || '';

                    body.appendChild(title);
                    body.appendChild(desc);

                    li.appendChild(check);
                    li.appendChild(body);

                    const selectStep = () => {
                        if (completedModules.includes(mod)) {
                            progress = totalSteps;
                            renderSteps();
                            renderStatus();
                            return;
                        }
                        progress = clamp(stepNumber, 0, totalSteps);
                        userProgress[String(mod)] = progress;
                        store[userId] = userProgress;
                        writeProgressStore(store);
                        renderSteps();
                        renderStatus();
                        if (finishBtn) finishBtn.disabled = progress < totalSteps;
                    };

                    li.addEventListener('click', selectStep);
                    li.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            selectStep();
                        }
                    });

                    stepsRoot.appendChild(li);
                });
            };

            const renderMaterials = () => {
                const items = Array.isArray(current.materials) ? current.materials : [];
                if (materialsRoot) {
                    materialsRoot.innerHTML = '';
                    items.forEach((text) => {
                        const li = document.createElement('li');
                        li.innerHTML = `<div class="bullet"></div><div style="flex:1;">${text}</div>`;
                        materialsRoot.appendChild(li);
                    });
                }
                if (materialsImg) {
                    materialsImg.innerHTML = current.img
                        ? `<img src="${current.img}" style="width:100%;height:100%;object-fit:cover;" alt="${current.title}">`
                        : '';
                }
            };

            const syncButtons = () => {
                const isCompleted = completedModules.includes(mod);
                if (finishBtn) {
                    finishBtn.style.display = 'inline-block';
                    finishBtn.disabled = !isCompleted && progress < totalSteps;
                    finishBtn.textContent = isCompleted ? 'Voltar ao Guia' : 'Concluir Módulo';
                }
                if (nextBtn) {
                    if (isCompleted && modules[next]) {
                        nextBtn.style.display = 'inline-block';
                        nextBtn.setAttribute('href', 'comecar-modulo.html?mod=' + next);
                    } else {
                        nextBtn.style.display = 'none';
                    }
                }
            };

            renderSteps();
            renderMaterials();
            renderStatus();
            syncButtons();

            finishBtn.addEventListener('click', () => {
                if (completedModules.includes(mod)) {
                    window.location.href = 'comecar.html';
                    return;
                }
                if (progress < totalSteps) {
                    alert('Conclua todos os passos antes de finalizar o módulo.');
                    return;
                }
                const completed = JSON.parse(localStorage.getItem('completedModules') || '[]');
                if (!completed.includes(mod)) {
                    completed.push(mod);
                    localStorage.setItem('completedModules', JSON.stringify(completed));
                }
                completedModules = completed;

                progress = totalSteps;
                userProgress[String(mod)] = progress;
                store[userId] = userProgress;
                writeProgressStore(store);

                renderStatus();
                syncButtons();

                window.location.href = 'comecar.html';
            });

            document.title = 'Módulo ' + (modules[mod] ? mod : 1) + ' - CocoRoot';
        })();
    </script>
    <script src="../js/layout.js"></script>
</body>

</html>
